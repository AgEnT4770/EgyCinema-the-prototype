<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Cinemas | CinemaAdmin</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
</head>
<body class="cinema-bg">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>
                <div class="brand-name">Cinema<span class="text-gold">Admin</span></div>
            </div>
            <nav class="nav-menu">
                <a href="admin-dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="admin-cinemas.html" class="nav-item active">🏢 Cinemas</a>
                <a href="admin-movies.html" class="nav-item">🎬 Movies</a>
                <a href="admin-employees.html" class="nav-item">👥 Employees</a>
                <a href="admin-bookings.html" class="nav-item">🎟️ Bookings</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h2 class="text-gradient-gold">Cinema Locations</h2>
                <button class="btn btn-hero">Add New Location</button>
            </header>

            <div class="admin-content">
                <div class="admin-panel">
                    <table class="admin-table" style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 1px solid var(--border); color: var(--gold);">
                                <th style="padding: 1rem;">Location Name</th>
                                <th style="padding: 1rem;">Screens</th>
                                <th style="padding: 1rem;">Address</th>
                                <th style="padding: 1rem; text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr style="border-bottom: 1px solid var(--border);">
                                <td style="padding: 1.5rem 1rem; font-weight: 600;">Grand Royale Megaplex</td>
                                <td style="padding: 1rem;">16</td>
                                <td style="padding: 1rem;" class="text-muted">7th Ave, Manhattan</td>
                                <td style="padding: 1rem; text-align: right;">
                                    <button class="btn btn-outline btn-sm">Edit</button>
                                    <button class="btn btn-outline btn-sm" style="color: var(--primary);">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
