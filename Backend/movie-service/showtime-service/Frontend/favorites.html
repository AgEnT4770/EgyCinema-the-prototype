<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Favorites — EgyCinema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="header-slot"></div>
  <main style="flex:1">
    <section class="container" style="padding:3rem 0">
      <div class="intro" style="text-align:center;max-width:36rem;margin:0 auto 2.5rem">
        <div class="eyebrow">Your collection</div>
        <h2 style="font-size:clamp(1.75rem,4vw,2.5rem);font-weight:700;margin-top:.5rem;font-family:'Playfair Display',serif">Favorite Movies</h2>
      </div>
      <div id="favList"></div>
    </section>
  </main>
  <div id="footer-slot"></div>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    mountChrome();
    function render(){
      const ids = Favs.all();
      const list = document.getElementById('favList');
      if(ids.length === 0){
        list.innerHTML = `
          <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">
            <div style="font-size:3rem;margin-bottom:1rem">★</div>
            <p>No favorites yet. Tap the star on any movie to add it here.</p>
            <a href="home.html" class="btn btn-hero btn-lg" style="margin-top:1.5rem">Browse movies</a>
          </div>`;
        return;
      }
      list.innerHTML = `<div class="fav-grid">${ids.map(id => {
        const m = getMovie(id); if(!m) return '';
        return `
          <div class="movie-card" style="width:auto">
            <a href="movie.html?id=${m.id}" style="display:block">
              <div class="poster">
                <span class="rating">${m.rating}</span>
                ${favButtonHTML(m.id)}
                <img src="${m.poster}" alt="${m.title} poster" loading="lazy" />
              </div>
              <h3>${m.title}</h3>
              <div class="movie-meta">
                <span>${ICONS.clock}${m.duration}</span>
                <span><span class="star">${ICONS.star}</span>${m.year}</span>
              </div>
            </a>
          </div>`;
      }).join('')}</div>`;
    }
    render();
    // Re-render when favorites change (so removed cards disappear)
    document.addEventListener('click', (e) => { if(e.target.closest('[data-fav]')) setTimeout(render, 0); });
  </script>
</body>
</html>
