spring.application.name=demo
# The connection string to your Docker Postgres container
spring.datasource.url=jdbc:postgresql://localhost:5432/cinemadb
spring.datasource.username=user
spring.datasource.password=password

# This tells Spring to use the PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# This automatically creates your tables (Cinema/Hall) based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Optional: See the SQL commands in the console
spring.jpa.show-sql=true